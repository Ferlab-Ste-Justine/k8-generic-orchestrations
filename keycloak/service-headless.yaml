# Headless service used by JGroups DNS_PING to discover Keycloak peer pods.
# Referenced from the deployment via `-Djgroups.dns.query=keycloak-headless`.
#
# `publishNotReadyAddresses: true` is required: a booting pod must be able
# to see its peers via DNS before its own readiness probe passes, otherwise
# it would never find the cluster to join.
apiVersion: v1
kind: Service
metadata:
  name: keycloak-headless
  labels:
    app: keycloak
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: keycloak
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
